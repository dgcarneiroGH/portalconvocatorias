<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <style>
        body { font-family: system-ui, sans-serif; line-height: 1.6; padding: 2rem; max-width: 800px; margin: 0 auto; }
        h1 { color: #333; }
        .grant-list { list-style: none; padding: 0; }
        .grant-item { background: #f4f4f4; margin-bottom: 1rem; padding: 1rem; border-radius: 8px; }
        .grant-item a { text-decoration: none; color: #0056b3; font-weight: bold; font-size: 1.1rem; }
        .grant-meta { font-size: 0.9rem; color: #666; margin-top: 0.5rem; display: block; }
    </style>
</head>
<body>
    <main>
        <h1>Bienvenido al {{ .Site.Title }}</h1>
        <p>Listado automático de las últimas páginas de subvenciones generadas:</p>
        
        <ul class="grant-list">
            {{ range .Site.RegularPages }}
            <li class="grant-item">
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                <span class="grant-meta">Subvenciones activas: {{ .Params.count }} | Región: {{ .Params.region }} | Beneficiario: {{ .Params.beneficiario }}</span>
            </li>
            {{ end }}
        </ul>
    </main>
</body>
</html>
