<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo de Subvenciones | {{ .Site.Title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <!-- Enlace al archivo CSS externo -->
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <main>
        <div style="text-align: center;">
            <div class="hero-title-container">
                <h1>Todas las Subvenciones Activas</h1>
            </div>
        </div>
        
        <p class="intro-text">Listado completo del directorio de grants.</p>
        
        <ul class="grant-list">
            {{ range .Pages }}
            <li class="grant-card">
                <span class="badge">Apertura: {{ .Params.date }}</span>
                <span class="badge">Ayudas activas: {{ .Params.count }}</span>
                <a href="{{ .RelPermalink }}" class="title-link">{{ .Title }}</a>
            </li>
            {{ end }}
        </ul>
    </main>
</body>
</html>
